<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> SmartSpeakTranslator(SST) </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="title">🌐 AI Voice Translator</div>
<div class="subtitle">Advanced Multilingual Voice Recognition & Translation App</div>

<div class="grid">

<div class="card">

<label>🎤 Input Language</label>

<select id="inputLang">
<option value="auto">Auto Detect</option>
<option value="en-US">English</option>
<option value="te-IN">Telugu</option>
<option value="hi-IN">Hindi</option>
<option value="ta-IN">Tamil</option>
<option value="kn-IN">Kannada</option>
<option value="ml-IN">Malayalam</option>
<option value="bn-IN">Bengali</option>
<option value="mr-IN">Marathi</option>
<option value="gu-IN">Gujarati</option>
<option value="pa-IN">Punjabi</option>
<option value="ur-IN">Urdu</option>
<option value="fr-FR">French</option>
<option value="de-DE">German</option>
<option value="ja-JP">Japanese</option>
<option value="ko-KR">Korean</option>
<option value="es-ES">Spanish</option>
</select>

<textarea id="speechOutput" placeholder="Your speech appears here..."></textarea>

<div class="buttons">
<button class="listen" onclick="startListening()">🎤 Start</button>
<button class="stop" onclick="stopSpeaking()">⏹ Stop Voice</button>
<button class="clear" onclick="clearAll()">🧹 Clear</button>
</div>

<div class="mic-animation" id="micAnimation">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

<div class="card">

<label>🌍 Translate To</label>

<select id="targetLang">
<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="bn">Bengali</option>
<option value="mr">Marathi</option>
<option value="gu">Gujarati</option>
<option value="pa">Punjabi</option>
<option value="ur">Urdu</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="es">Spanish</option>
</select>

<textarea id="translatedText" placeholder="Translated text appears here..."></textarea>

<div class="buttons">
<button class="translate" onclick="translateText()">🌍 Translate</button>
<button class="swap" onclick="swapLanguages()">🔄 Swap</button>
<button onclick="copyText()">📋 Copy</button>
<button class="download" onclick="downloadText()">📥 Download</button>
<button class="dark" onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="range-box">
<label>🔊 Voice Speed</label>
<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<label>🎚 Voice Pitch</label>
<input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
</div>

</div>

</div>

<div class="card history">
<h3>📝 Translation History</h3>
<div id="history"></div>
</div>

<div class="footer">
Made with ❤️ using HTML, CSS & JavaScript
</div>

</div>
<script src="script.js"> 
</script>

</body>
</html>
